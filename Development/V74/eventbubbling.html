<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .child{
        background-color: aliceblue;
        border: 2px solid black;
        padding: 34px;
        margin: 34px;
        cursor: pointer;
    }
    .childcontainer{
        background-color: rgb(22, 81, 133);
        border: 2px solid black;
        padding: 34px;
        margin: 34px;
    }
    .container{
        background-color: rgb(140, 255, 0);
        border: 2px solid black;
        padding: 34px;
        margin: 34px;
    }
    
</style>
<body>
    <div class="container">
        <section class="childcontainer">
            <div class="child">I am a child</div>
        </section>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click", (e)=>{
            e.stopPropagation();
            alert("Child was touched💀")
        })

        document.querySelector(".childcontainer").addEventListener("click", (e)=>{
            e.stopPropagation();
            alert("Child Container was touched")
        })
        
        document.querySelector(".container").addEventListener("click", (e)=>{
            e.stopPropagation();
            alert("Container was touched")  
        })  

        function getrandomcolor() {
            let val1 = Math.ceil(0+Math.random()*255)
            let val2 = Math.ceil(0+Math.random()*255)
            let val3 = Math.ceil(0+Math.random()*255)
            return `rgb(${val1}, ${val2}, ${val3})`
        }

        setInterval(() => {
            document.querySelector(".childcontainer").style.background= getrandomcolor()
        }, 500);

        // let a=setTimeout(=>{
        //     document.querySelector(".childcontainer").style.background= getrandomcolor()
        // }, 1000);
    </script>
</body>
</html>
