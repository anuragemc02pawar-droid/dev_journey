<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Card Design</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cause:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
</style>
</style>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body {
            background-color: grey;
        }

        .card {
            background-color: white;
            width: 198px;
            height: 500px;
            border-radius: 7px;
        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 7px;

        }
        .content p{
            font-size: 13px;
            color: rgb(136, 134, 132);
            padding: 5px 0;
        }
        .capsules span{
border: 1px solid rgb(161, 157, 157);
padding: 0 6px;
border-radius: 7px;
font-family: "Poppins", sans-serif;
  font-weight: 200;
  font-style: normal;
  font-size: 9.6px;
}
        .capsules{
            padding: 0 28px 0 14px;
            
        }
        .content{
            padding: 7px 13px;
            font-family: "Cause", cursive;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
        }
        .button{
            text-align: center;
        }
        .button button{
            padding: 8px 17px;
            border-radius: 19px;
            background-color: rgb(190, 221, 235);
            color: rgb(108, 174, 228);
            font-size: 12px;
            border: none;
            font-weight:bold;
            margin-top: 3px;
            cursor: pointer;
        }
        .button button:hover{
            background-color: rgb(224, 228, 226);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="image">

                alt="Photo full length of man crouching on boat over lake against sky" loading="lazy" data-rank="9">
