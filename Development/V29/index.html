<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        header{
            position: sticky;
            top: 0;
        }
        *{
            margin: 0;padding: 0;
        }
        nav{
            background-color: darkblue;
            height: 83px;
        }
        .container{
            background-color: green;
            margin: 12px 34px;
            text-align: center;
            padding: 56px 23px;
        }
        .box1{
            background-color: rgb(227, 39, 71);
            height: 70vh;
            width: 40%;
            display: inline-block;
            margin: 15px 50px;
        }
        .box2{
            background-color: blue;
            height: 70vh;
            width: 40%;
            display: inline-block;
            margin: 15px 50px;

        }
        footer{
            height: 100px;
            background-color: bisque;
        }
        .text-box{
            padding: 34px;
            border: 2px solid rgb(0, 0, 0);
            margin: 0 24vw;
            border-radius: 13px;
            font-size: 1em;
            text-align: center;
            font-size: 23px;
        }
        main{
            background-color: rgb(114, 147, 203);
            color: rgb(0, 0, 0);
            padding: 24px 0 12px 0;
        }
        ul li{
            list-style: none;
            margin: 24px;
            padding: 11px;
            border: 2px solid white;
            border-radius: 39px;
            color: rgb(255, 255, 255);
            font-weight: bold;
            
        }
        ul{
            display: flex;
        }
        ul li a{
            text-decoration: none;
            color: white;
            opacity: 75%;
        }
        .orangebox{
            height: 62px;
            width: 62px;
            position: fixed;
            bottom: 12px;
            right: 23px;
            border-radius: 53px;
            background-color: orange;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li> <a href="https://www.amazon.com/">Home</a></li>
                <li> <a href="https://www.aboutamazon.com/about-us">About</a></li>
                <li> <a href="https://www.amazon.com/gp/help/customer/display.html?nodeId=508510&ref_=footer_gw_m_b_he">Contact Us</a></li>
            <ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>
        <div class="text-box">
            This is a Layout 
        </div>
        <div class="orangebox">

        </div>

    </main>

    <footer>

    </footer>
</body>
</html>
