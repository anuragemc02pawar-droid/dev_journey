<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors by Anurag</title>
    <style>
        h1{
            color: darkred;
        }
        h2{
            color:rgb(99, 96, 96);

    <h2>RGB</h2>

    <h5>HSL</h5>

</html>
