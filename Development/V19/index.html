<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists by Anurag</title>
    <style>
        nav ul li{
            list-style: devanagari;
            list-style-type: "💀";
            background-color: yellow;
            list-style-position: inside;
            border: 2px solid orangered;
            padding: 2px;
            margin: 2.9px;

        }
        ul{
            display: flex;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>

</html>
