<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce by Anurag</title>
    <style>
        *{
            margin: 0;padding: 0;
        }
        .container{
            position: relative;
            height: 100vh;
            width: 100vw;
            background-color: rgb(0, 255, 55);
        }
        .box{
            position:absolute;
            height: 121px;
            width: 121px;
            background-color: rgb(255, 0, 0);
            border-radius: 70px;
            left: 0;
            bottom: 0;
            animation: animateX 3s linear infinite, animateY 1s ease-out infinite alternate;

        }
        @keyframes animateX{
            from{
                left: 0;
            }
            to{
                left: 100%;
            }
        }
        @keyframes animateY{
            from{
                bottom: 0;
            }
            to{
                bottom: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">

        </div>
    </div>    
</body>
</html>
