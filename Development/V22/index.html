<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Variables by Anurag</title>
    <style>
        :root{
            --color: rgb(8, 8, 115);
            --seccolor: rgb(105, 105, 196);
            --defpad:15px;
            --defop:0.2;
        }
        *{
            margin: 0;
            padding: 0;
        }
        .nav{
            background-color: var(--color);
        }
        ul{
            display: flex;
        }
        ul li{
            opacity: var(--defop);
            list-style: none;
            padding: var(--defpad);
            border: 2px solid var(--seccolor);
        }
        ul li:first-child{
            --seccolor:orange;
            background-color: var(--seccolor);
        }
        .container{
            background-color: var(--seccolor);
        }

    </style>
</head>
<body>
    <div class="nav">
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </div>
    <div class="container">
        Lorem ipsum dolor sit, amet consectetur adipisicing elit. Maxime molestiae optio dolor iusto tenetur nesciunt hic, odio quas quasi molestias adipisci saepe expedita, reiciendis non.
    </div>
</body>
</html>
