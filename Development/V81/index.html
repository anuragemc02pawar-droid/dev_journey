<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        body {
            background-color: green;
            color: white;
            font-family: "Courier Prime", monospace;
            font-size: 30px;
        }
    </style>
</head>

<body>
    <!-- Create a hacking simulator which has green background and it shows these messages with random delay of 1 to 7 seconds 
    
    

    The three dots must blink so that it looks like a real terminal
    -->
    <div>Initializing Hacking</div>
    <script>
       setInterval(() => {
           let last= document.body.getElementsByTagName("div")
           last=last[last.length-1]
           if(last.innerHTML.endsWith("...")){
            last.innerHTML=last.innerHTML.slice(0,last.innerHTML.length-3)
           }
           else{
           last.innerHTML=last.innerHTML+"."
           }
        }, 350);
          const addItem =async(item)=>{
                await randDelay();
                let div=document.createElement("div");
                div.innerHTML=item;
                document.body.append(div)

            }
        const randDelay =()=>{
            return new Promise((resolve, reject)=>{
                timeout=1+6*Math.random()
                setTimeout(() => {
                    resolve()
                }, timeout*1000);
            })
        }
        let text = ["Initialized",
            "Reading your Files",
            "Password files Detected",
            "Sending all passwords and personal files to server",      //js array
            "Cleaning up"]

            for (const item of text) {
                addItem(item)
            }
            
          
    </script>
</body>

</html>
