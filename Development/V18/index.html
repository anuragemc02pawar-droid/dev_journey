<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows and Outlines</title>
    <style>
        .box{
            border: 2px solid crimson;
            box-shadow: 5px 15px 5px violet;
        }
        p{
            text-shadow: 5px 15px 5px blue;
        }
    </style>
</head>
<body>
    <div class="box">
        Hey this is about shadows
    </div>
    <div>
        <p class="textshadow">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Quam deserunt odit possimus officiis quod, sit quisquam id, nam optio quos harum aliquam molestias?
        </p>
    </div>
</body>
</html>
