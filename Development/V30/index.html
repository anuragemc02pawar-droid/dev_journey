<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform by Anurag</title>
    <style>
        .box{
            height: 50px;
            width: 50px;
            background-color: beige;
            border: 2px solid black;
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotateX(79deg);
        }
        .container{
            height: 100vh;
            width: 80vw;
            border: 2px solid purple;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box1{
            height: 50px;
            width: 50px;
            background-color: beige;
            border: 2px solid black;
            display: flex;
            margin: 50px;
            transform: scale(1.6) skew(5deg) translate(34%);     
}
    </style>
</head>
<body>
    <div class="container">
        <div class="box">box
        </div>
        <div class="box1">box1</div>
    </div>
</body>
</html>
